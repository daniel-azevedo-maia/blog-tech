services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blogtech
      POSTGRES_USER: blogtech
      POSTGRES_PASSWORD: blogtech
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogtech -d blogtech"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/blogtech
      DB_USER: blogtech
      DB_PASSWORD: blogtech
      DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
