<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar conta | Blog Tech</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <script defer th:src="@{/js/cep.js}"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page narrow">
    <section class="form-card">
        <span class="eyebrow">Nova conta</span>
        <h1>Cadastro de usuário</h1>
        <p>Preencha os dados abaixo. Os campos marcados são obrigatórios.</p>

        <form th:action="@{/usuario/cadastrar}" th:object="${usuarioobj}" method="post" class="stack-form">
            <div class="alert error" th:if="${#fields.hasGlobalErrors()}" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></div>

            <fieldset>
                <legend>Informações pessoais</legend>
                <div class="form-grid">
                    <div>
                        <label for="nome">Nome</label>
                        <input id="nome" type="text" th:field="*{nome}" autocomplete="given-name">
                        <small class="field-error" th:errors="*{nome}"></small>
                    </div>
                    <div>
                        <label for="sobrenome">Sobrenome</label>
                        <input id="sobrenome" type="text" th:field="*{sobrenome}" autocomplete="family-name">
                        <small class="field-error" th:errors="*{sobrenome}"></small>
                    </div>
                    <div class="span-2">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" th:field="*{email}" autocomplete="email">
                        <small class="field-error" th:errors="*{email}"></small>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Endereço</legend>
                <div class="form-grid">
                    <div>
                        <label for="cep">CEP</label>
                        <input id="cep" type="text" th:field="*{endereco.cep}" inputmode="numeric" placeholder="00000-000">
                        <small class="field-error" th:errors="*{endereco.cep}"></small>
                        <small id="cep-status" class="help-text">O preenchimento automático é opcional.</small>
                    </div>
                    <div>
                        <label for="numero">Número</label>
                        <input id="numero" type="text" th:field="*{endereco.numero}">
                        <small class="field-error" th:errors="*{endereco.numero}"></small>
                    </div>
                    <div class="span-2">
                        <label for="logradouro">Logradouro</label>
                        <input id="logradouro" type="text" th:field="*{endereco.logradouro}">
                        <small class="field-error" th:errors="*{endereco.logradouro}"></small>
                    </div>
                    <div>
                        <label for="bairro">Bairro</label>
                        <input id="bairro" type="text" th:field="*{endereco.bairro}">
                        <small class="field-error" th:errors="*{endereco.bairro}"></small>
                    </div>
                    <div>
                        <label for="cidade">Cidade</label>
                        <input id="cidade" type="text" th:field="*{endereco.cidade}">
                        <small class="field-error" th:errors="*{endereco.cidade}"></small>
                    </div>
                    <div>
                        <label for="uf">UF</label>
                        <input id="uf" type="text" th:field="*{endereco.uf}" maxlength="2">
                        <small class="field-error" th:errors="*{endereco.uf}"></small>
                    </div>
                    <div>
                        <label for="complemento">Complemento</label>
                        <input id="complemento" type="text" th:field="*{endereco.complemento}">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Dados de acesso</legend>
                <div class="form-grid">
                    <div class="span-2">
                        <label for="login">Login</label>
                        <input id="login" type="text" th:field="*{login}" autocomplete="username">
                        <small class="field-error" th:errors="*{login}"></small>
                    </div>
                    <div>
                        <label for="senha">Senha</label>
                        <input id="senha" type="password" th:field="*{senha}" autocomplete="new-password">
                        <small class="field-error" th:errors="*{senha}"></small>
                    </div>
                    <div>
                        <label for="confirmarSenha">Confirmar senha</label>
                        <input id="confirmarSenha" type="password" th:field="*{confirmarSenha}" autocomplete="new-password">
                        <small class="field-error" th:errors="*{confirmarSenha}"></small>
                    </div>
                </div>
            </fieldset>

            <div class="form-actions">
                <a class="button secondary" th:href="@{/}">Cancelar</a>
                <button class="button primary" type="submit">Criar conta</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
