<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header class="site-header" th:fragment="navbar">
    <nav class="navbar container-wide" aria-label="Navegação principal">
        <a class="brand" th:href="@{/}">BLOG TECH</a>
        <div class="nav-links">
            <a th:href="@{/}">Publicações</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/post/novo}">Nova publicação</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/usuario/listar}">Usuários</a>
            <a sec:authorize="isAnonymous()" th:href="@{/login}">Entrar</a>
            <a sec:authorize="isAnonymous()" th:href="@{/usuario/novo}">Cadastrar</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="link-button">Sair</button>
            </form>
        </div>
    </nav>
</header>
</body>
</html>
