<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nova publicação | Blog Tech</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="page narrow">
    <section class="form-card">
        <span class="eyebrow">Escrever</span>
        <h1>Nova publicação</h1>
        <p>Autor: <strong th:text="${autor}">Autor</strong></p>

        <form th:action="@{/post/cadastrar}" th:object="${postobj}" method="post"
              enctype="multipart/form-data" class="stack-form">
            <div class="alert error" th:if="${#fields.hasGlobalErrors()}" th:each="erro : ${#fields.globalErrors()}" th:text="${erro}"></div>

            <label for="titulo">Título</label>
            <input id="titulo" type="text" th:field="*{titulo}">
            <small class="field-error" th:errors="*{titulo}"></small>

            <label for="subtitulo">Subtítulo</label>
            <input id="subtitulo" type="text" th:field="*{subtitulo}">
            <small class="field-error" th:errors="*{subtitulo}"></small>

            <label for="categoria">Categoria</label>
            <select id="categoria" th:field="*{categoria}">
                <option value="">Escolha uma categoria</option>
                <option value="Big Data e Análise de Dados">Big Data e Análise de Dados</option>
                <option value="Blockchain e Criptomoedas">Blockchain e Criptomoedas</option>
                <option value="Cibersegurança">Cibersegurança</option>
                <option value="Computação em Nuvem">Computação em Nuvem</option>
                <option value="DevOps">DevOps</option>
                <option value="Games e Entretenimento">Games e Entretenimento</option>
                <option value="Hardware">Hardware</option>
                <option value="Internet das Coisas">Internet das Coisas</option>
                <option value="Inteligência Artificial e Machine Learning">Inteligência Artificial e Machine Learning</option>
                <option value="Programação e Desenvolvimento">Programação e Desenvolvimento</option>
                <option value="Tecnologias Emergentes">Tecnologias Emergentes</option>
            </select>
            <small class="field-error" th:errors="*{categoria}"></small>

            <label for="imagemPost">Imagem de capa <span class="optional">(opcional)</span></label>
            <input id="imagemPost" type="file" th:field="*{imagemPost}" accept="image/jpeg,image/png,image/webp,image/gif">
            <small class="help-text">JPG, PNG, WEBP ou GIF, até 10 MB.</small>
            <small class="field-error" th:errors="*{imagemPost}"></small>

            <label for="textoPrincipal">Conteúdo</label>
            <textarea id="textoPrincipal" th:field="*{textoPrincipal}" rows="14"></textarea>
            <small class="field-error" th:errors="*{textoPrincipal}"></small>

            <div class="form-actions">
                <a class="button secondary" th:href="@{/}">Cancelar</a>
                <button class="button primary" type="submit">Publicar</button>
            </div>
        </form>
    </section>
</main>
</body>
</html>
