<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrar | Blog Tech</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="auth-page">
    <section class="form-card compact">
        <span class="eyebrow">Bem-vindo de volta</span>
        <h1>Entrar</h1>
        <p>Use seu login e sua senha para continuar.</p>

        <div class="alert success" th:if="${usuarioCadastrado != null}"
             th:text="'Conta criada, ' + ${usuarioCadastrado} + '. Agora faça o login.'"></div>
        <div class="alert error" th:if="${param.error}">Login ou senha inválidos.</div>

        <form th:action="@{/login}" method="post" class="stack-form">
            <label for="username">Login</label>
            <input id="username" name="username" type="text" autocomplete="username" required autofocus>

            <label for="password">Senha</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button class="button primary full" type="submit">Entrar</button>
        </form>

        <p class="form-footer">Ainda não possui conta? <a th:href="@{/usuario/novo}">Cadastre-se</a>.</p>
    </section>
</main>
</body>
</html>
