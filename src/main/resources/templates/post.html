<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${postobj.titulo} + ' | Blog Tech'">Publicação | Blog Tech</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="article-page">
    <div class="alert success" th:if="${mensagemSucesso}" th:text="${mensagemSucesso}"></div>

    <article>
        <header class="article-header">
            <span class="tag" th:text="${postobj.categoria}">Categoria</span>
            <h1 th:text="${postobj.titulo}">Título</h1>
            <p class="lead" th:text="${postobj.subtitulo}">Subtítulo</p>
            <div class="article-meta">
                <span th:text="'Por ' + ${postobj.nomeAutor}">Autor</span>
                <time th:text="${#temporals.format(postobj.dataPublicacao, 'dd/MM/yyyy HH:mm')}">Data</time>
            </div>
        </header>

        <img class="article-cover" th:if="${postobj.possuiImagem}"
             th:src="@{/post/imagem/{id}(id=${postobj.id})}"
             th:alt="'Imagem da publicação ' + ${postobj.titulo}">

        <div class="article-content" th:text="${postobj.textoPrincipal}">Conteúdo</div>
    </article>

    <a class="back-link" th:href="@{/}">← Voltar para as publicações</a>
</main>
</body>
</html>
